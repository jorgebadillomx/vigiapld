# Team / enterprise overrides for the bmad-quick-dev skill.
# Committed to the repo — applies to every developer on the project.
#
# Merged over the skill's customize.toml per BMad structural rules:
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append.
# The skill's own SKILL.md / customize.toml must NOT be edited (overwritten on update);
# customize here instead.
#
# mem0 scope: memorias compartidas del proyecto usan agent_id="PreLavadoDinero"
# tanto al escribir (add_memory) como al filtrar en lectura (search_memories).

[workflow]

# Recuperar memorias relevantes de mem0 una vez saludado el usuario,
# antes de comenzar el workflow. Se appendea a los activation steps del skill.
activation_steps_append = [
  "Consulta el MCP mem0 al iniciar: llama `mcp__mem0-mcp__search_memories` con `filters={\"AND\":[{\"agent_id\":\"PreLavadoDinero\"}]}` y una query relevante a este proyecto o cambio para recuperar aprendizajes previos (decisiones técnicas, convenciones del proyecto, gotchas y bugs recurrentes) y cárgalos como contexto. Si el servidor mem0 no está disponible, omítelo silenciosamente y continúa.",
  "Antes de definir o capturar el requerimiento a realizar, activa la skill `grill-me`: entrevista al usuario de forma exhaustiva sobre el requerimiento (alcance, supuestos, casos límite, criterios de aceptación y restricciones), resolviendo cada rama de decisión hasta alcanzar entendimiento compartido. Solo procede a implementar y continuar el workflow cuando el requerimiento esté claro y confirmado por el usuario.",
]

# Carried as foundational context for the whole quick-dev run, including
# when code is written. Appended to the skill defaults.
persistent_facts = [
  "Al implementar código que dependa de cualquier librería, framework, SDK, API o herramienta CLI externa, consulta SIEMPRE el MCP context7 antes de escribir el código: usa `mcp__context7__resolve-library-id` para resolver cada librería y luego `mcp__context7__query-docs` para obtener la sintaxis de API, configuración y patrones de uso actuales. No te bases en la memoria del modelo para detalles de librerías, ya que los datos de entrenamiento pueden estar desactualizados. Si context7 no está disponible o no encuentra coincidencia para una librería, continúa con el mejor conocimiento disponible y deja constancia de ello.",
  "Escribe en el MCP mem0 cuando más convenga durante la ejecución: cada vez que surja un aprendizaje durable y reutilizable (una decisión de arquitectura, una convención del proyecto, un gotcha, la causa raíz de un bug, o algo que el equipo debería recordar) llama `mcp__mem0-mcp__add_memory` con `agent_id=\"PreLavadoDinero\"` y un `text` conciso y autocontenido. No dupliques memorias que ya existan ni guardes detalles efímeros de esta conversación. Si mem0 no está disponible, omítelo.",
]

# Scalar: ejecutado al llegar al paso final del workflow. Override wins.
on_complete = "Antes de terminar, registra en el MCP mem0 (`mcp__mem0-mcp__add_memory` con `agent_id=\"PreLavadoDinero\"`) un resumen conciso de los aprendizajes durables de este cambio (decisiones técnicas, convenciones, gotchas y patrones) que sean útiles para futuro trabajo. Omítelo si no hay nada nuevo que valga la pena recordar o si mem0 no está disponible. Luego integra el trabajo en develop: verifica que TODOS los cambios estén commiteados, cambia a la rama `develop`, mergea la rama de trabajo de este cambio y haz push de `develop` al remoto; después borra la rama de trabajo (local y, si existe, remota). NUNCA borres `develop` ni `main`. Si hay conflictos de merge, tests/validaciones fallando, o la rama actual ya es `develop`/`main`, DETENTE y reporta en vez de forzar."
