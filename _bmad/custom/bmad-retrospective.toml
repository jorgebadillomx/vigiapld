# Team / enterprise overrides for the bmad-retrospective skill.
# Committed to the repo — applies to every developer on the project.
#
# Merged over the skill's customize.toml per BMad structural rules:
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append.
# The skill's own SKILL.md / customize.toml must NOT be edited (overwritten on update);
# customize here instead.
#
# mem0 scope: memorias compartidas del proyecto usan agent_id="PreLavadoDinero"
# tanto al escribir (add_memory) como al filtrar en lectura (search_memories).

[workflow]

# Recuperar memorias relevantes de mem0 antes de facilitar la retro.
activation_steps_append = [
  "Consulta el MCP mem0 al iniciar: llama `mcp__mem0-mcp__search_memories` con `filters={\"AND\":[{\"agent_id\":\"PreLavadoDinero\"}]}` y una query relevante para recuperar lecciones y action items de retrospectivas anteriores, decisiones del equipo y problemas recurrentes, e incorpóralos al contexto de la retrospectiva. Si el servidor mem0 no está disponible, omítelo silenciosamente y continúa.",
]

persistent_facts = [
  "Escribe en el MCP mem0 cuando más convenga durante la retrospectiva: cada vez que se acuerde una lección, un action item o una decisión que el equipo debería recordar en futuros epics, llama `mcp__mem0-mcp__add_memory` con `agent_id=\"PreLavadoDinero\"` y un `text` conciso y autocontenido. No dupliques memorias que ya existan ni guardes detalles efímeros de esta conversación. Si mem0 no está disponible, omítelo.",
]

# Scalar: ejecutado al llegar al paso final (Step 12). Override wins.
on_complete = "Antes de terminar, registra en el MCP mem0 (`mcp__mem0-mcp__add_memory` con `agent_id=\"PreLavadoDinero\"`) las lecciones clave y los action items con dueño acordados en esta retrospectiva, además de cualquier decisión o convención durable, de forma que estén disponibles en futuras retrospectivas y epics. Omítelo si no hay nada nuevo que valga la pena recordar o si mem0 no está disponible."
